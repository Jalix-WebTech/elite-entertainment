<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <!-- ============================================
       VERTEX CONSULT — Company Logo
       Deep navy background with white wordmark
       and classic microphone replacing the "i"
       Background: #0a1440 | Text: #ffffff
       ============================================ -->

  <!-- Navy background -->
  <rect width="800" height="500" rx="0" fill="#0a1440"/>

  <!-- "e" (lowercase, serif italic style) -->
  <text x="140" y="320" text-anchor="middle"
        font-family="'Playfair Display','Georgia','Times New Roman',serif"
        font-size="200" font-weight="700" font-style="italic"
        fill="#ffffff">e</text>

  <!-- "l" -->
  <text x="230" y="320" text-anchor="middle"
        font-family="'Playfair Display','Georgia','Times New Roman',serif"
        font-size="200" font-weight="700" font-style="italic"
        fill="#ffffff">l</text>

  <!-- Microphone (replaces the "i") -->
  <g transform="translate(318, 130)">
    <!-- Mic head (grill) -->
    <ellipse cx="0" cy="0" rx="22" ry="30" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="-14" y1="-16" x2="14" y2="-16" stroke="#ffffff" stroke-width="1.8"/>
    <line x1="-16" y1="-8" x2="16" y2="-8" stroke="#ffffff" stroke-width="1.8"/>
    <line x1="-17" y1="0" x2="17" y2="0" stroke="#ffffff" stroke-width="1.8"/>
    <line x1="-16" y1="8" x2="16" y2="8" stroke="#ffffff" stroke-width="1.8"/>
    <line x1="-14" y1="16" x2="14" y2="16" stroke="#ffffff" stroke-width="1.8"/>
    <!-- Mic body / stem -->
    <rect x="-8" y="30" width="16" height="100" rx="4" fill="#ffffff"/>
    <!-- Mic base -->
    <ellipse cx="0" cy="140" rx="20" ry="6" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  </g>

  <!-- "t" -->
  <text x="395" y="320" text-anchor="middle"
        font-family="'Playfair Display','Georgia','Times New Roman',serif"
        font-size="200" font-weight="700" font-style="italic"
        fill="#ffffff">t</text>

  <!-- "e" (second) -->
  <text x="490" y="320" text-anchor="middle"
        font-family="'Playfair Display','Georgia','Times New Roman',serif"
        font-size="200" font-weight="700" font-style="italic"
        fill="#ffffff">e</text>

  <!-- Decorative dot after elite -->

  <!-- "ENTERTAINMENT" subtitle -->
  <text x="400" y="390" text-anchor="middle"
        font-family="'Inter','Helvetica Neue','Segoe UI',Arial,sans-serif"
        font-size="32" font-weight="400" letter-spacing="18"
        fill="#ffffff">ENTERTAINMENT</text>
</svg>